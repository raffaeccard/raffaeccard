name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # todo dia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: RaffaelE

          outputs: |
            dist/snake-tron.svg?palette=github-dark&color_snake=#00ffff&color_dots=#0a0f2c,#112240,#1b2a4e,#2a3f73,#00ffff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
